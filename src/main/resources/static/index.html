<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinemate - Movie Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Cinemate</h1>
            <p>Discover the world of cinema</p>
            <div class="search-container">
                <input type="text" id="movieSearch" placeholder="Search for a movie (e.g., Inception)..." autocomplete="off" />
                <button id="searchBtn">Search</button>
                
                <!-- NEW: The Live Suggestion Dropdown -->
                <ul id="suggestionsDropdown" class="suggestions-dropdown hidden"></ul>
            </div>
        </header>

        <main id="movieContainer">
            <div class="empty-state">
                <span class="icon">🎬</span>
                <p>Ready to explore? Please type a movie title above.</p>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
